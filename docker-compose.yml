# New-API Docker Compose Configuration (SQLite)
#
# Quick Start:
#   1. make docker
#   2. docker-compose up -d
#   3. Access at http://localhost:3000
#
# SQLite database file is stored in ./data/new-api.db

version: '3.4'

services:
  new-api:
    image: sqkam/new-api
    build: .
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - REDIS_CONN_STRING=redis://:123456@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
    depends_on:
      - redis
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]
    networks:
      - new-api-network

networks:
  new-api-network:
    driver: bridge
